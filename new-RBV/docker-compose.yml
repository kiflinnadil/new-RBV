services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rbv_app
    restart: unless-stopped
    ports:
      - "8000:80"
    env_file:
      - .env

    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    container_name: rbv_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: rbv-new
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: rbv_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - mysql

volumes:
  mysql_data: